<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>登录 – PICU 药学监护</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; background: #f5f5f5; color: #333; font-size: 15px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.header { background: #2563eb; color: #fff; width: 100%; text-align: center; padding: 14px; font-size: 17px; font-weight: 600; position: fixed; top: 0; }
.form-card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.1); padding: 32px 24px; width: 100%; max-width: 380px; margin-top: 60px; }
.form-card h2 { text-align: center; margin-bottom: 24px; color: #1e40af; font-size: 20px; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 14px; color: #475569; margin-bottom: 6px; }
.field input { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 16px; }
.field input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.15); }
.btn { display: block; width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; min-height: 48px; background: #2563eb; color: #fff; margin-top: 8px; }
.btn:active { background: #1d4ed8; }
.link-row { text-align: center; margin-top: 16px; font-size: 14px; color: #64748b; }
.link-row a { color: #2563eb; text-decoration: none; }
.flash { padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
.flash.error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
.flash.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
</style>
</head>
<body>
<div class="header">PICU 药学监护</div>
<div class="form-card">
  <h2>登录</h2>
  {% with messages = get_flashed_messages(with_categories=true) %}
  {% for cat, msg in messages %}
  <div class="flash {{ cat }}">{{ msg }}</div>
  {% endfor %}
  {% endwith %}
  <form method="POST">
    <div class="field">
      <label for="username">用户名</label>
      <input id="username" name="username" type="text" autocomplete="username" required autofocus>
    </div>
    <div class="field">
      <label for="password">密码</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
    </div>
    <button class="btn" type="submit">登录</button>
  </form>
  <div class="link-row">还没有账号？<a href="{{ url_for('auth.register') }}">注册</a></div>
</div>
</body>
</html>
