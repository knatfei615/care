<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>药学监护</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; background: #f5f5f5; color: #333; font-size: 15px; }

/* ── Toolbar ── */
.toolbar { position: sticky; top: 0; z-index: 100; background: #2563eb; color: #fff; display: flex; align-items: center; padding: 10px 16px; gap: 10px; }
.toolbar h1 { font-size: 17px; flex: 1; }
.toolbar button { background: rgba(255,255,255,.2); color: #fff; border: none; border-radius: 6px; padding: 8px 12px; font-size: 13px; cursor: pointer; min-height: 36px; }
.toolbar button:active { background: rgba(255,255,255,.35); }

/* ── Container ── */
.container { max-width: 600px; margin: 0 auto; padding: 12px; }

/* ── Upload area ── */
.upload-area { background: #fff; border: 2px dashed #cbd5e1; border-radius: 12px; padding: 40px 20px; text-align: center; margin-top: 20px; }
.upload-area.dragover { border-color: #2563eb; background: #eff6ff; }
.upload-area p { margin-bottom: 16px; color: #64748b; }
.upload-area label { display: inline-block; background: #2563eb; color: #fff; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 15px; min-height: 44px; line-height: 20px; }
.upload-area input[type="file"] { display: none; }

/* ── Cards / sections ── */
.card { background: #fff; border-radius: 10px; padding: 14px; margin-bottom: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
.card h2 { font-size: 15px; margin-bottom: 10px; color: #1e40af; }
.card-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
.card-head h2 { margin-bottom: 0; }
.btn-outline { border: 1px solid #2563eb; color: #2563eb; background: #fff; border-radius: 8px; padding: 7px 10px; font-size: 13px; cursor: pointer; min-height: 34px; }
.add-form { margin-bottom: 10px; padding: 10px; border: 1px solid #dbeafe; border-radius: 8px; background: #f8fbff; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.field { display: flex; flex-direction: column; gap: 4px; }
.field input { width: 100%; padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; }
.field-full { grid-column: 1 / -1; }

/* ── Search ── */
.search-input { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 16px; margin-bottom: 10px; }

/* ── Patient list ── */
.patient-list { max-height: 260px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.patient-item { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; cursor: pointer; min-height: 44px; }
.patient-item:active, .patient-item.selected { background: #eff6ff; }
.patient-item.selected { border-left: 3px solid #2563eb; }
.patient-main { display: flex; gap: 8px; align-items: baseline; }
.patient-item .bed { font-weight: 600; color: #2563eb; min-width: 36px; }
.patient-item .name { font-weight: 500; min-width: 48px; }
.patient-item .id { color: #64748b; font-size: 13px; }
.patient-item .diag { color: #94a3b8; font-size: 13px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.patient-meta { margin-top: 4px; color: #64748b; font-size: 12px; line-height: 1.4; }
.patient-summary { margin-top: 12px; padding: 10px 12px; border-radius: 8px; background: #eff6ff; color: #1e3a8a; font-size: 13px; line-height: 1.5; }
.history-list { display: flex; flex-direction: column; gap: 8px; }
.history-item { border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; background: #fff; }
.history-item.empty { background: #f8fafc; color: #94a3b8; }
.history-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; gap: 10px; }
.history-title { font-weight: 600; color: #1e293b; font-size: 14px; }
.history-meta { color: #64748b; font-size: 12px; }
.history-preview { color: #334155; font-size: 13px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
.history-item.empty .history-preview { color: #94a3b8; }
.btn-small { border: 1px solid #2563eb; color: #2563eb; background: #eff6ff; border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer; min-height: 30px; }
.btn-small:disabled { border-color: #cbd5e1; color: #94a3b8; background: #f8fafc; cursor: not-allowed; }
.edit-banner { margin-bottom: 8px; border-radius: 8px; padding: 8px 10px; font-size: 13px; background: #fff7ed; color: #9a3412; border: 1px solid #fdba74; }
.btn-muted { background: #475569; color: #fff; }
.btn-muted:active { background: #334155; }

/* ── Pill toggles ── */
.pill-group { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.pill { padding: 7px 14px; border-radius: 20px; border: 1px solid #d1d5db; background: #fff; font-size: 14px; cursor: pointer; min-height: 36px; transition: all .15s; }
.pill.active { background: #2563eb; color: #fff; border-color: #2563eb; }

/* ── Date input ── */
.date-input { padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 16px; width: 100%; }

/* ── Textarea ── */
textarea { width: 100%; border: 1px solid #d1d5db; border-radius: 8px; padding: 10px 12px; font-size: 16px; font-family: inherit; resize: vertical; min-height: 100px; }

/* ── Buttons ── */
.btn { display: block; width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; min-height: 48px; margin-top: 10px; }
.btn-primary { background: #2563eb; color: #fff; }
.btn-primary:active { background: #1d4ed8; }
.btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }
.btn-success { background: #16a34a; color: #fff; }
.btn-success:active { background: #15803d; }
.btn-success:disabled { background: #86efac; cursor: not-allowed; }

/* ── Status / toast ── */
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 14px; z-index: 200; opacity: 0; transition: opacity .3s; pointer-events: none; max-width: 90vw; text-align: center; }
.toast.show { opacity: 1; }
.toast.error { background: #dc2626; }
.spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }

.hidden { display: none !important; }
.label { font-size: 13px; color: #64748b; margin-bottom: 4px; }
.row { display: flex; gap: 10px; align-items: center; }
</style>
</head>
<body>

<!-- Toolbar -->
<div class="toolbar">
  <h1>PICU 药学监护</h1>
  <span id="userDisplay" style="font-size:13px;opacity:.85"></span>
  <a id="btnAdmin" class="hidden" href="/admin/users" style="background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:6px;padding:8px 12px;font-size:13px;text-decoration:none;min-height:36px;display:inline-flex;align-items:center;">管理</a>
  <button id="btnDownload" class="hidden" onclick="downloadFile()">下载</button>
  <button id="btnReupload" class="hidden" onclick="showUpload()">换文件</button>
  <button onclick="location.href='/logout'" style="background:rgba(255,255,255,.15)">退出</button>
</div>

<!-- Upload view -->
<div id="viewUpload" class="container">
  <div class="upload-area" id="dropZone">
    <p>上传监护工作簿 (.xlsm) 到云端</p>
    <label for="fileInput">选择文件</label>
    <input type="file" id="fileInput" accept=".xlsm" onchange="uploadFile(this.files[0])">
  </div>
</div>

<!-- Main work view -->
<div id="viewMain" class="container hidden">

  <!-- Patient selection -->
  <div class="card">
    <div class="card-head">
      <h2>选择患者</h2>
      <button class="btn-outline" onclick="toggleAddPatientForm()">+ 添加患者</button>
    </div>
    <div class="add-form hidden" id="addPatientForm">
      <div class="label">手动添加患者（A-C 可选；住院号允许重复）</div>
      <div class="form-grid">
        <div class="field"><span class="label">科室（A，可选）</span><input id="addDepartment" type="text"></div>
        <div class="field"><span class="label">药师（B，可选）</span><input id="addPharmacist" type="text"></div>
        <div class="field"><span class="label">工号（C，可选）</span><input id="addEmployeeId" type="text"></div>
        <div class="field"><span class="label">住院号（D）</span><input id="addInpatientNo" type="text"></div>
        <div class="field"><span class="label">床号（E）</span><input id="addBedNo" type="text"></div>
        <div class="field"><span class="label">姓名（F）</span><input id="addName" type="text"></div>
        <div class="field"><span class="label">年龄（G）</span><input id="addAge" type="text"></div>
        <div class="field"><span class="label">性别（H）</span><input id="addSex" type="text"></div>
        <div class="field"><span class="label">体重kg（I）</span><input id="addWeight" type="text"></div>
        <div class="field"><span class="label">入院日期（J）</span><input id="addAdmissionDate" type="date"></div>
        <div class="field field-full"><span class="label">入院诊断（K）</span><input id="addDiagnosis" type="text"></div>
      </div>
      <div class="row" style="margin-top:10px;">
        <button class="btn-outline" onclick="submitAddPatient()">提交新增</button>
        <button class="btn-outline" onclick="closeAddPatientForm()">取消</button>
      </div>
    </div>
    <input class="search-input" id="searchInput" type="text" placeholder="搜索床号、诊断或匿名编号…" oninput="filterPatients()">
    <div class="patient-list" id="patientList"></div>
    <div class="patient-summary hidden" id="patientSummary"></div>
  </div>

  <!-- History -->
  <div class="card">
    <h2>既往监护记录</h2>
    <div class="label" id="historyHint">请选择患者后查看记录</div>
    <div class="history-list" id="historyList"></div>
  </div>

  <!-- Level & Type -->
  <div class="card" id="cardOptions">
    <div class="label">监护级别</div>
    <div class="pill-group" id="levelGroup"></div>
    <div class="label">监护类型</div>
    <div class="pill-group" id="typeGroup"></div>
    <div class="label">日期</div>
    <input class="date-input" id="dateInput" type="date">
  </div>

  <!-- Raw input -->
  <div class="card">
    <h2>查房记录（可选）</h2>
    <div class="label">可先输入查房口述后使用 AI 生成标准记录，也可直接在下方手动填写监护意见。</div>
    <textarea id="rawInput" placeholder="输入查房口述记录，如：万古霉素谷浓度15，偏高，建议减量…" rows="4"></textarea>
    <button class="btn btn-primary" id="btnGenerate" onclick="generateNote()">AI 生成标准记录（可选）</button>
  </div>

  <!-- Preview -->
  <div class="card" id="cardPreview">
    <h2>监护意见（可手动编辑）</h2>
    <div id="editBanner" class="edit-banner hidden"></div>
    <textarea id="previewText" rows="6"></textarea>
    <button class="btn btn-success" id="btnSave" onclick="saveNote()">保存到 Excel</button>
    <button class="btn btn-muted hidden" id="btnCancelEdit" onclick="cancelEditing()">取消编辑模式</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const csrfToken = "{{ csrf_token() }}";

/* ── State ── */
let patients = [];
let selectedPatient = null;
let slotStatuses = [];
let editingSlot = null;
let pendingSelectRowIdx = null;
const LEVELS = ["一级监护", "二级监护", "三级监护"];
const TYPES = ["药学查房", "药物重整", "药学监护", "用药咨询", "用药教育"];

/* ── Init ── */
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("dateInput").value = new Date().toISOString().slice(0, 10);
  initPills("levelGroup", LEVELS, "二级监护");
  initPills("typeGroup", TYPES, "药学监护");
  refreshEditingState();
  setupDragDrop();
  checkWorkbook();
  loadUserInfo();
});

async function loadUserInfo() {
  try {
    const res = await fetch("/api/me");
    const data = await res.json();
    document.getElementById("userDisplay").textContent = data.display_name || data.username;
    if (data.role === "admin") document.getElementById("btnAdmin").classList.remove("hidden");
  } catch (_) {}
}

/* ── Drag & drop ── */
function setupDragDrop() {
  const zone = document.getElementById("dropZone");
  zone.addEventListener("dragover", e => { e.preventDefault(); zone.classList.add("dragover"); });
  zone.addEventListener("dragleave", () => zone.classList.remove("dragover"));
  zone.addEventListener("drop", e => {
    e.preventDefault();
    zone.classList.remove("dragover");
    const file = e.dataTransfer.files[0];
    if (file) uploadFile(file);
  });
}

/* ── Upload ── */
async function uploadFile(file) {
  if (!file) return;
  if (!file.name.toLowerCase().endsWith(".xlsm")) {
    toast("仅支持 .xlsm 文件", true);
    return;
  }
  const fd = new FormData();
  fd.append("file", file);
  toast("上传中…");
  try {
    const res = await fetch("/api/upload", { method: "POST", headers: withCsrfHeaders(), body: fd });
    const data = await res.json();
    if (data.error) { toast(data.error, true); return; }
    toast("上传成功");
    showMain();
    loadPatients();
  } catch (e) { toast("上传失败: " + e.message, true); }
}

/* ── Check if workbook exists ── */
async function checkWorkbook() {
  try {
    const res = await fetch("/api/patients");
    const data = await res.json();
    if (data.patients) {
      patients = data.patients;
      showMain();
      renderPatients();
    }
  } catch (_) {}
}

/* ── Download ── */
function downloadFile() {
  window.location.href = "/api/download";
}

/* ── View switching ── */
function showUpload() {
  document.getElementById("viewUpload").classList.remove("hidden");
  document.getElementById("viewMain").classList.add("hidden");
  document.getElementById("btnDownload").classList.add("hidden");
  document.getElementById("btnReupload").classList.add("hidden");
  document.getElementById("fileInput").value = "";
}

function showMain() {
  document.getElementById("viewUpload").classList.add("hidden");
  document.getElementById("viewMain").classList.remove("hidden");
  document.getElementById("btnDownload").classList.remove("hidden");
  document.getElementById("btnReupload").classList.remove("hidden");
  loadPatients();
}

/* ── Patients ── */
async function loadPatients() {
  try {
    const res = await fetch("/api/patients");
    const data = await res.json();
    if (data.error) { toast(data.error, true); return; }
    patients = data.patients;
    if (pendingSelectRowIdx !== null) {
      selectedPatient = patients.find(p => p.row_idx === pendingSelectRowIdx) || null;
      pendingSelectRowIdx = null;
    }
    if (selectedPatient) {
      selectedPatient = patients.find(p => p.row_idx === selectedPatient.row_idx) || null;
    }
    renderPatients();
    updatePatientSummary();
    if (selectedPatient) {
      loadSlotStatuses();
    } else {
      slotStatuses = [];
      document.getElementById("historyHint").textContent = "请选择患者后查看记录";
      document.getElementById("historyList").innerHTML = "";
    }
  } catch (e) { toast("加载患者列表失败", true); }
}

function toggleAddPatientForm() {
  document.getElementById("addPatientForm").classList.toggle("hidden");
}

function closeAddPatientForm() {
  document.getElementById("addPatientForm").classList.add("hidden");
}

function clearAddPatientForm() {
  [
    "addDepartment",
    "addPharmacist",
    "addEmployeeId",
    "addInpatientNo",
    "addBedNo",
    "addName",
    "addAge",
    "addSex",
    "addWeight",
    "addAdmissionDate",
    "addDiagnosis",
  ].forEach(id => {
    document.getElementById(id).value = "";
  });
}

async function submitAddPatient() {
  const payload = {
    department: document.getElementById("addDepartment").value.trim(),
    pharmacist: document.getElementById("addPharmacist").value.trim(),
    employee_id: document.getElementById("addEmployeeId").value.trim(),
    inpatient_no: document.getElementById("addInpatientNo").value.trim(),
    bed_no: document.getElementById("addBedNo").value.trim(),
    name: document.getElementById("addName").value.trim(),
    age: document.getElementById("addAge").value.trim(),
    sex: document.getElementById("addSex").value.trim(),
    weight: document.getElementById("addWeight").value.trim(),
    admission_date: document.getElementById("addAdmissionDate").value.trim(),
    diagnosis: document.getElementById("addDiagnosis").value.trim(),
  };

  if (!payload.inpatient_no && !payload.name) {
    toast("住院号和姓名至少填写一个", true);
    return;
  }

  try {
    const res = await fetch("/api/patients", {
      method: "POST",
      headers: withCsrfHeaders({ "Content-Type": "application/json" }),
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (data.error) {
      toast(data.error, true);
      return;
    }

    pendingSelectRowIdx = data.patient && data.patient.row_idx ? data.patient.row_idx : null;
    await loadPatients();
    closeAddPatientForm();
    clearAddPatientForm();
    toast("患者已添加");
  } catch (e) {
    toast("添加患者失败: " + e.message, true);
  }
}

function renderPatients() {
  const q = document.getElementById("searchInput").value.trim().toLowerCase();
  const list = document.getElementById("patientList");
  const filtered = patients.filter(p =>
    !q || p.name.toLowerCase().includes(q) ||
    p.inpatient_no.toLowerCase().includes(q) ||
    p.bed_no.toLowerCase().includes(q) ||
    p.diagnosis.toLowerCase().includes(q) ||
    (p.age || "").toLowerCase().includes(q) ||
    (p.sex || "").toLowerCase().includes(q) ||
    (p.weight || "").toLowerCase().includes(q) ||
    (p.admission_date || "").toLowerCase().includes(q)
  );
  list.innerHTML = filtered.map(p =>
    `<div class="patient-item ${selectedPatient && selectedPatient.row_idx === p.row_idx ? 'selected' : ''}"
          onclick="selectPatient(${p.row_idx})">
      <div class="patient-main">
        <span class="bed">${p.bed_no || '-'}</span>
        <span class="name">${p.name}</span>
        <span class="id">${p.inpatient_no}</span>
        <span class="diag">${p.diagnosis}</span>
      </div>
      <div class="patient-meta">${formatPatientMeta(p)}</div>
    </div>`
  ).join("");
}

function filterPatients() { renderPatients(); }

function selectPatient(rowIdx) {
  selectedPatient = patients.find(p => p.row_idx === rowIdx);
  clearEditingState();
  renderPatients();
  updatePatientSummary();
  loadSlotStatuses();
  // Apply previous defaults
  if (selectedPatient.prev_level) setPill("levelGroup", selectedPatient.prev_level);
  if (selectedPatient.prev_type) setPill("typeGroup", selectedPatient.prev_type);
}

async function loadSlotStatuses() {
  const hintEl = document.getElementById("historyHint");
  const listEl = document.getElementById("historyList");
  if (!selectedPatient) {
    slotStatuses = [];
    hintEl.textContent = "请选择患者后查看记录";
    listEl.innerHTML = "";
    return;
  }

  hintEl.textContent = "正在加载既往记录…";
  listEl.innerHTML = "";
  try {
    const res = await fetch(`/api/slots/${selectedPatient.row_idx}`);
    const data = await res.json();
    if (data.error) {
      slotStatuses = [];
      hintEl.textContent = "加载既往记录失败";
      toast(data.error, true);
      return;
    }
    slotStatuses = data.slots || [];
    hintEl.textContent = "点击“编辑”可回填并修改既往记录";
    renderSlotStatuses();
  } catch (_) {
    slotStatuses = [];
    hintEl.textContent = "加载既往记录失败";
    toast("加载既往记录失败", true);
  }
}

function renderSlotStatuses() {
  const listEl = document.getElementById("historyList");
  if (!selectedPatient) {
    listEl.innerHTML = "";
    return;
  }
  if (!slotStatuses.length) {
    listEl.innerHTML = `<div class="history-item empty"><div class="history-preview">暂无可显示的记录</div></div>`;
    return;
  }

  listEl.innerHTML = slotStatuses.map(slot => {
    const previewText = slot.has_note ? escapeHtml(slot.preview || "") : "该槽位暂无记录";
    const dateText = slot.date ? escapeHtml(slot.date) : "无日期";
    return `<div class="history-item ${slot.has_note ? "" : "empty"}">
      <div class="history-head">
        <div>
          <div class="history-title">记录 ${slot.index}</div>
          <div class="history-meta">${dateText}</div>
        </div>
        <button class="btn-small" onclick="editSlot(${slot.index})" ${slot.has_note ? "" : "disabled"}>编辑</button>
      </div>
      <div class="history-preview">${previewText}</div>
    </div>`;
  }).join("");
}

async function editSlot(slotIndex) {
  if (!selectedPatient) {
    toast("请先选择患者", true);
    return;
  }
  try {
    const res = await fetch(`/api/slots/${selectedPatient.row_idx}/${slotIndex}`);
    const data = await res.json();
    if (data.error) {
      toast(data.error, true);
      return;
    }
    const slot = data.slot || {};
    if (!slot.has_note) {
      toast("该记录为空，无法编辑", true);
      return;
    }

    document.getElementById("dateInput").value = (slot.date || "").slice(0, 10) || new Date().toISOString().slice(0, 10);
    if (slot.level) setPill("levelGroup", slot.level);
    if (slot.note_type) setPill("typeGroup", slot.note_type);
    document.getElementById("previewText").value = slot.note || "";

    editingSlot = slotIndex;
    refreshEditingState();
    toast(`已加载记录${slotIndex}，保存将覆盖该记录`);
  } catch (_) {
    toast("加载记录详情失败", true);
  }
}

function cancelEditing() {
  clearEditingState();
  toast("已退出编辑模式");
}

function clearEditingState() {
  editingSlot = null;
  refreshEditingState();
}

function refreshEditingState() {
  const bannerEl = document.getElementById("editBanner");
  const btnSave = document.getElementById("btnSave");
  const btnCancel = document.getElementById("btnCancelEdit");
  if (editingSlot) {
    bannerEl.textContent = `当前正在编辑记录 ${editingSlot}，点击保存会覆盖该条历史记录。`;
    bannerEl.classList.remove("hidden");
    btnSave.textContent = `覆盖保存到记录${editingSlot}`;
    btnCancel.classList.remove("hidden");
  } else {
    bannerEl.textContent = "";
    bannerEl.classList.add("hidden");
    btnSave.textContent = "保存到 Excel";
    btnCancel.classList.add("hidden");
  }
}

function formatPatientMeta(patient) {
  const fields = [];
  if (patient.age) fields.push(`年龄 ${patient.age}`);
  if (patient.sex) fields.push(`性别 ${patient.sex}`);
  if (patient.weight) fields.push(`体重 ${patient.weight} kg`);
  if (patient.admission_date) fields.push(`入院 ${patient.admission_date}`);
  return fields.join(" | ") || "暂无更多患者信息";
}

function updatePatientSummary() {
  const el = document.getElementById("patientSummary");
  if (!selectedPatient) {
    el.classList.add("hidden");
    el.textContent = "";
    return;
  }

  const parts = [
    selectedPatient.name || "未命名患者",
    selectedPatient.bed_no ? `床号 ${selectedPatient.bed_no}` : "",
    selectedPatient.inpatient_no ? `住院号 ${selectedPatient.inpatient_no}` : "",
    selectedPatient.age ? `年龄 ${selectedPatient.age}` : "",
    selectedPatient.sex ? `性别 ${selectedPatient.sex}` : "",
    selectedPatient.weight ? `体重 ${selectedPatient.weight} kg` : "",
    selectedPatient.admission_date ? `入院日期 ${selectedPatient.admission_date}` : "",
    selectedPatient.diagnosis ? `诊断 ${selectedPatient.diagnosis}` : "",
  ].filter(Boolean);

  el.textContent = parts.join(" | ");
  el.classList.remove("hidden");
}

function buildPatientInfoText(patient) {
  if (!patient) return "";

  const parts = [
    patient.bed_no ? `床号：${patient.bed_no}` : "",
    patient.name ? `姓名：${patient.name}` : "",
    patient.inpatient_no ? `住院号：${patient.inpatient_no}` : "",
    patient.age ? `年龄：${patient.age}` : "",
    patient.sex ? `性别：${patient.sex}` : "",
    patient.weight ? `体重：${patient.weight}kg` : "",
    patient.admission_date ? `入院日期：${patient.admission_date}` : "",
    patient.diagnosis ? `诊断：${patient.diagnosis}` : "",
  ].filter(Boolean);

  return parts.join("，");
}

/* ── Pills ── */
function initPills(groupId, options, defaultVal) {
  const group = document.getElementById(groupId);
  group.innerHTML = options.map(o =>
    `<span class="pill ${o === defaultVal ? 'active' : ''}" onclick="togglePill(this, '${groupId}')">${o}</span>`
  ).join("");
}

function togglePill(el, groupId) {
  document.querySelectorAll(`#${groupId} .pill`).forEach(p => p.classList.remove("active"));
  el.classList.add("active");
}

function setPill(groupId, value) {
  document.querySelectorAll(`#${groupId} .pill`).forEach(p => {
    p.classList.toggle("active", p.textContent === value);
  });
}

function getActivePill(groupId) {
  const el = document.querySelector(`#${groupId} .pill.active`);
  return el ? el.textContent : "";
}

/* ── Generate ── */
async function generateNote() {
  const raw = document.getElementById("rawInput").value.trim();
  if (!raw) { toast("请输入查房记录", true); return; }

  const btn = document.getElementById("btnGenerate");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>生成中…';

  let patientInfo = "";
  if (selectedPatient) {
    patientInfo = buildPatientInfoText(selectedPatient);
  }

  try {
    const res = await fetch("/api/generate", {
      method: "POST",
      headers: withCsrfHeaders({ "Content-Type": "application/json" }),
      body: JSON.stringify({ raw_text: raw, patient_info: patientInfo }),
    });
    const data = await res.json();
    if (data.error && !data.note) {
      toast(data.error, true);
    } else {
      document.getElementById("previewText").value = data.note;
      document.getElementById("cardPreview").classList.remove("hidden");
      if (data.error) toast(data.error, true);
    }
  } catch (e) {
    toast("生成失败: " + e.message, true);
  } finally {
    btn.disabled = false;
    btn.textContent = "AI 生成标准记录（可选）";
  }
}

/* ── Save ── */
async function saveNote() {
  if (!selectedPatient) { toast("请先选择患者", true); return; }

  const noteText = document.getElementById("previewText").value.trim();
  if (!noteText) { toast("记录内容为空", true); return; }

  const btn = document.getElementById("btnSave");
  const currentEditingSlot = editingSlot;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>保存中…';

  try {
    const payload = {
      row_idx: selectedPatient.row_idx,
      note_text: noteText,
      level: getActivePill("levelGroup"),
      note_type: getActivePill("typeGroup"),
      date: document.getElementById("dateInput").value,
    };
    if (currentEditingSlot) {
      payload.overwrite_slot = currentEditingSlot;
    }

    const res = await fetch("/api/save", {
      method: "POST",
      headers: withCsrfHeaders({ "Content-Type": "application/json" }),
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (data.error) {
      toast(data.error, true);
    } else {
      toast(currentEditingSlot ? `已覆盖记录${data.slot_index}` : `已保存到记录${data.slot_index}`);
      document.getElementById("rawInput").value = "";
      document.getElementById("previewText").value = "";
      clearEditingState();
      loadSlotStatuses();
      loadPatients();
    }
  } catch (e) {
    toast("保存失败: " + e.message, true);
  } finally {
    btn.disabled = false;
    refreshEditingState();
  }
}

/* ── Toast ── */
function withCsrfHeaders(headers = {}) {
  return { "X-CSRFToken": csrfToken, ...headers };
}

function toast(msg, isError) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast show" + (isError ? " error" : "");
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.className = "toast", 2500);
}

function escapeHtml(text) {
  return String(text)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}
